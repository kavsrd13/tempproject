name: Train and Deploy MLOps Pipeline

on:
  push:
    paths:
      - 'data/raw/dataset.csv.dvc'
      - 'dvc.lock'
      - 'src/**'
      - '.github/workflows/**'
    branches:
      - main

jobs:
  train_and_deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
        
    - name: DVC Pull
      env:
        AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
      run: |
        # The remote 'azure_remote' is already in .dvc/config from git
        # We just need to securely inject the connection string for this runner
        dvc remote modify --local azure_remote connection_string "$AZURE_STORAGE_CONNECTION_STRING"
        dvc pull data/raw/dataset.csv.dvc
        
    - name: Run Training Pipeline
      run: |
        python src/train.py
        
    - name: Deploy to Azure Container Apps
      # If training passes, run the deployment script
      run: |
        chmod +x deploy_to_azure.sh
        ./deploy_to_azure.sh
